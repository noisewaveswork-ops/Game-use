<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Игра</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        /* Phaser сам создаст canvas, дополнительно можно центрировать */
        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <!-- Подключаем Phaser через CDN -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

    <!-- Код вашей игры -->
    <script>
        class MainScene extends Phaser.Scene {
            constructor() {
                super("MainScene");
            }

            preload() {
                this.load.image("player", "assets/player.png");
                this.load.image("ui", "assets/ui.png");
                // видео фон
                this.load.video("bg", "assets/bg.mp4", "loadeddata", false, true);
            }

            create() {
                // 🎥 фон-видео
                this.bg = this.add.video(200, 300, "bg"); // центр 400x600
                this.bg.play(true);
                this.bg.setMute(true);     // иначе autoplay не сработает
                this.bg.setLoop(true);

                this.bg.setDepth(-1);      // отправляем назад
                console.log(this.bg);

                // форс через событие
                this.bg.on('play', () => {
                    console.log('video started');
                });

                // игрок
                this.player = this.add.image(400, 300, "player");
                this.player.setScale(1);

                // включаем мышь
                this.input.setDefaultCursor("none");

                this.pointer = this.input.activePointer;

                // плавность движения
                this.smooth = 0.15;

                this.ui = this.add.image(200, 300, "ui");
                this.ui.setDepth(9999);
            }

            update() {
                let targetX = this.pointer.x;
                let targetY = this.pointer.y;

                // плавное следование за мышью
                this.player.x += (targetX - this.player.x) * this.smooth;
                this.player.y += (targetY - this.player.y) * this.smooth;
            }
        }

        const config = {
            type: Phaser.AUTO,
            width: 400,
            height: 600,
            backgroundColor: "#0b0b0b",
            scene: MainScene,
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH
            }
        };

        // Запускаем игру после загрузки DOM (можно и без обёртки, но так надёжнее)
        window.addEventListener('load', () => {
            new Phaser.Game(config);
        });
    </script>

</body>
</html>
